<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Latitude Zero CMS</title>
  <style>
    body {
      align-items: center;
      background: #f7f3ee;
      color: #2f2a25;
      display: flex;
      font-family: Arial, sans-serif;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }

    main {
      background: #fff;
      border: 1px solid #e7ded4;
      border-radius: 8px;
      max-width: 520px;
      padding: 28px;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 12px;
    }

    p {
      line-height: 1.5;
      margin: 0 0 16px;
    }

    a {
      color: #8b5a2b;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Use the Flask admin panel</h1>
    <p>The live CMS for Latitude Zero Cottages runs with the Flask app so edits are saved to the application database and shown on the website through the Flask APIs.</p>
    <p><a href="https://latitudezero.up.railway.app/admin/">Open production admin</a></p>
  </main>
</body>
</html>
