<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Latitude Zero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #231F20 0%, #4C4E4F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #fff;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-area img {
            max-width: 140px;
            margin-bottom: 16px;
        }
        .logo-area h1 {
            font-size: 1.5rem;
            color: #231F20;
            font-weight: 700;
        }
        .logo-area p {
            color: #4C4E4F;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #231F20;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e4e1;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #C9BDB5;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #231F20;
            color: #C9BDB5;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover {
            background: #4C4E4F;
        }
        .flash-messages {
            margin-bottom: 20px;
        }
        .flash {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .flash.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .flash.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .flash.info {
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #4C4E4F;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #231F20;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <img src="/images/logos/secondary-logo.png" alt="Latitude Zero">
            <h1>Admin Panel</h1>
            <p>Sign in to manage your site</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">
                    {{ csrf_field() }}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <a href="/" class="back-link">Back to Website</a>
    </div>
</body>
</html>
